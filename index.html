<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>En Kısa Yol Algoritmaları</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>

  <div class="container">
    <div class="baslik-alani">
      <img src="neu_logo.png" alt="NEÜ Logo" class="uni-logo">
      <h2>En Kısa Yol Algoritmaları</h2>
    </div>

    <div class="controls">
      <select id="algoritma">
        <option value="dijkstra">Dijkstra</option>
        <option value="bellman">Bellman-Ford</option>
        <option value="prim">Prim</option>
        <option value="kruskal">Kruskal</option>
      </select>

      <select id="baslangic">
        <option value="1">A</option>
        <option value="2">B</option>
        <option value="3">C</option>
        <option value="4">D</option>
        <option value="5">E</option>
      </select>

      <button onclick="algoritmayiBaslat()">Başlat</button>
      <button onclick="grafigiSifirla()">Sıfırla</button>
      
      <button id="btnOynat" onclick="oynatDuraklat()" disabled>⏸️ Duraklat</button>
      <button id="btnGeri" onclick="geri()" disabled>⏪ Geri</button>
      <button id="btnIleri" onclick="ileri()" disabled>İleri ⏩</button>
    </div>

    <div class="content">
      <div id="ag"></div>

      <div class="side-panel">
        <div class="table-box">
          <h3>Mesafe Tablosu</h3>
          <table id="tablo">
            <thead>
              <tr>
                <th>Düğüm</th>
                <th>Mesafe</th>
                <th>Önceki</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="log-box">
          <h3>İşlem Adımları</h3>
          <ul id="log-listesi"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
